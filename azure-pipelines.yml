trigger:
- main

pool:
  name: 'yt-clone-agent'

stages:
- stage: Build
  jobs:
  - job: Build
    pool:
      name: 'yt-clone-agent'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: npm install
      displayName: 'Install dependencies'

    - script: npm run build
      displayName: 'Build React app'

    # Debug: Check root directory contents
    - script: ls -la
      displayName: 'Check root folder content'

    # Debug: Check build folder contents
    - script: ls -la build
      displayName: 'Verify build folder content'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'build'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: Deploy
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      name: 'yt-clone-agent'
    steps:
    - task: DownloadBuildArtifacts@1
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: AzureRmWebAppDeployment@5
      inputs:
        ConnectionType: 'AzureRM'
        azureSubscription: 'resource-connection'
        appType: 'webAppLinux'
        WebAppName: 'yt-clone-app'
        packageForLinux: '$(System.ArtifactsDirectory)/drop/build'
        RuntimeStack: 'NODE|20-lts'
        DeploymentTypeLinux: 'oneDeploy'
