trigger:
- main

pool:
  name: 'yt-clone-agent'

stages:
- stage: Build
  jobs:
  - job: Build
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: npm install
      displayName: 'Install dependencies'

    - script: npm run build
      displayName: 'Build React app'

    - script: |
        echo "Zipping build folder"
        cd build
        zip -r ../build.zip .
      displayName: 'Zip build folder'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'build.zip'
        ArtifactName: 'drop'
        publishLocation: 'Container'
      displayName: 'Publish zipped build as artifact'

- stage: Deploy
  dependsOn: Build
  jobs:
  - job: Deploy
    steps:
    - task: DownloadBuildArtifacts@1
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'
      displayName: 'Download build artifact'

    - task: AzureRmWebAppDeployment@5
      inputs:
        ConnectionType: 'AzureRM'
        azureSubscription: 'resource-connection'
        appType: 'webAppLinux'
        WebAppName: 'yt-clone-app'
        packageForLinux: '$(System.ArtifactsDirectory)/drop/build.zip'
        RuntimeStack: 'NODE|18-lts'
        DeploymentTypeLinux: 'zipDeploy'
      displayName: 'Deploy zipped React app to Azure'
