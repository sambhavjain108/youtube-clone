trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildFolder: 'build'
  artifactName: 'drop'

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build React App'
    steps:
    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: |
        npm install
      displayName: 'Install dependencies'

    - script: |
        npm run build
      displayName: 'Build React app'

    - task: ArchiveFiles@2
      displayName: 'Archive build folder'
      inputs:
        rootFolderOrFile: '$(buildFolder)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(buildFolder).zip'
        replaceExistingArchive: true

    - task: PublishBuildArtifacts@1
      displayName: 'Publish build artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(buildFolder).zip'
        ArtifactName: '$(artifactName)'
        publishLocation: 'Container'

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  jobs:
  - job: DeployWebApp
    displayName: 'Deploy to Azure Web App'
    steps:
    - download: current
      artifact: '$(artifactName)'

    - task: AzureWebApp@1
      displayName: 'Deploy to Azure App Service'
      inputs:
        azureSubscription: 'Azure for Students(d4740efc-a4a2-4ebb-a22d-479705f709bf)'
        appType: 'webAppLinux'
        appName: 'yt-clone-app'
        package: '$(Pipeline.Workspace)/$(artifactName)/$(buildFolder).zip'
        runtimeStack: 'NODE|18-lts'
